# Infraestrutura como código para Render.com
# Documentação: https://render.com/docs/blueprint-spec
#
# Importar: dashboard Render → "New +" → "Blueprint" → liga o repo Git.
# A BD é o Neon Postgres já provisionado — DATABASE_URL é colada
# manualmente no dashboard (sync: false) na primeira importação.

services:
  - type: web
    name: valor-futuro
    runtime: python
    plan: free          # Free dorme após 15 min sem tráfego (acorda em ~30s)
    region: frankfurt   # Latência mais baixa para Angola
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true       # Render gera chave forte automaticamente
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: DATABASE_URL
        sync: false               # Render pede para colar no primeiro deploy
      # Para uploads persistentes (plano Starter, ~$1/mês):
      # - key: UPLOAD_FOLDER
      #   value: /var/data/uploads
    # disk:
    #   name: uploads
    #   mountPath: /var/data/uploads
    #   sizeGB: 1
