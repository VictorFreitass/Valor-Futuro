# Infraestrutura como código para Render.com
# Documentação: https://render.com/docs/blueprint-spec
#
# Importar via: dashboard Render → "New +" → "Blueprint" → liga o repo Git.
# Render lê este ficheiro e provisiona web service + Postgres automaticamente.

services:
  - type: web
    name: valor-futuro
    runtime: python
    plan: free  # passa para "starter" ($7/mês) para uptime 24/7 e disco persistente
    region: frankfurt  # closest to Angola; alternatives: oregon, ohio, singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true        # Render gera uma chave forte; nunca aparece em logs
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: valor-futuro-db
          property: connectionString
      # Descomenta quando passares para um plano com persistent disk
      # - key: UPLOAD_FOLDER
      #   value: /var/data/uploads
    # Descomenta quando estiveres num plano pago para guardar uploads entre deploys.
    # disk:
    #   name: uploads
    #   mountPath: /var/data/uploads
    #   sizeGB: 1

databases:
  - name: valor-futuro-db
    plan: free        # 1GB, 90 dias de retenção. Upgrade para "starter" ($7/mês) para produção real.
    region: frankfurt
    databaseName: valor_futuro
    user: valor_futuro
