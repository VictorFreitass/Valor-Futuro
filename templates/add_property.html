{% extends "base.html" %}

{% block title %}Adicionar Imóvel · Valor Futuro{% endblock %}

{% block content %}
<section class="section">
    <div class="container" style="max-width: 920px;">
        <div class="admin-header">
            <h1>Adicionar Novo Imóvel</h1>
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">← Voltar</a>
        </div>

        <form method="POST" enctype="multipart/form-data" style="background: var(--dark-secondary); padding: 2.5rem; border: 1px solid var(--border-color); border-radius: 4px;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem;">
                <div class="form-group">
                    <label for="title">Título do Imóvel</label>
                    <input type="text" id="title" name="title" placeholder="ex: Villa Contemporânea Premium" required>
                </div>

                <div class="form-group">
                    <label for="price">Preço (Kz)</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" placeholder="350000000" required>
                </div>

                <div class="form-group">
                    <label for="location">Localização</label>
                    <input type="text" id="location" name="location" placeholder="ex: Talatona, Luanda" required>
                </div>

                <div class="form-group">
                    <label for="property_type">Tipo de Imóvel</label>
                    <select id="property_type" name="property_type" required>
                        <option value="">Selecione…</option>
                        <option value="apartamento">Apartamento</option>
                        <option value="casa">Casa</option>
                        <option value="villa">Villa</option>
                        <option value="escritorio">Escritório</option>
                        <option value="loft">Loft</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="bedrooms">Quartos</label>
                    <input type="number" id="bedrooms" name="bedrooms" min="0" placeholder="3" required>
                </div>

                <div class="form-group">
                    <label for="bathrooms">Casas de Banho</label>
                    <input type="number" id="bathrooms" name="bathrooms" min="0" placeholder="2" required>
                </div>

                <div class="form-group">
                    <label for="area">Área (m²)</label>
                    <input type="number" id="area" name="area" step="0.01" min="0" placeholder="250" required>
                </div>

                <div class="form-group">
                    <label for="status">Estado</label>
                    <select id="status" name="status" required>
                        <option value="para venda">Para Venda</option>
                        <option value="aluguel">Para Aluguer</option>
                        <option value="vendido">Vendido</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Descrição Detalhada</label>
                <textarea id="description" name="description" placeholder="Descreva características, comodidades, vistas, materiais premium…" required></textarea>
            </div>

            <div class="form-group">
                <label for="images">Imagens</label>
                <input type="file" id="images" name="images" multiple accept="image/*">
                <small style="color: var(--text-muted); display: block; margin-top: 0.5rem;">PNG, JPG, JPEG, GIF, WebP · seleção múltipla</small>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 0.6rem;">
                <input type="checkbox" id="is_featured" name="is_featured">
                <label for="is_featured" style="margin: 0; text-transform: none; font-weight: 400; letter-spacing: normal;">Marcar como imóvel em destaque na página inicial</label>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Adicionar Imóvel</button>
                <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary" style="flex: 1;">Cancelar</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
