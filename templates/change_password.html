{% extends "base.html" %}

{% block title %}Alterar Password · Valor Futuro{% endblock %}

{% block content %}
<section class="section">
    <div class="container" style="max-width: 520px;">
        <div class="admin-header">
            <h1 style="font-size: 1.6rem;">Alterar Password</h1>
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">← Voltar</a>
        </div>

        <form method="POST" style="background: var(--dark-secondary); padding: 2rem; border: 1px solid var(--border-color); border-radius: 4px;">
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">
                Logado como <strong style="color: var(--gold);">{{ current_user.username }}</strong>.
                Mínimo 8 caracteres. Após alterar, terá de fazer login novamente.
            </p>

            <div class="form-group">
                <label for="current_password">Password actual</label>
                <input type="password" id="current_password" name="current_password" autocomplete="current-password" required autofocus>
            </div>

            <div class="form-group">
                <label for="new_password">Nova password</label>
                <input type="password" id="new_password" name="new_password" autocomplete="new-password" minlength="8" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmar nova password</label>
                <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" minlength="8" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Alterar Password</button>
        </form>
    </div>
</section>
{% endblock %}
