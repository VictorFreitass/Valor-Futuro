<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#d4af37" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#glow)"/>
  <g transform="translate(400 270)" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.85">
    <polygon points="0,-40 35,0 0,40 -35,0" />
    <circle r="70" stroke-opacity="0.4"/>
    <circle r="100" stroke-opacity="0.18"/>
  </g>
  <text x="400" y="400" text-anchor="middle" fill="#d4af37" font-family="Georgia, 'Times New Roman', serif" font-size="32" letter-spacing="6" font-style="italic">Valor Futuro</text>
  <text x="400" y="430" text-anchor="middle" fill="#a8a8a8" font-family="Inter, Arial, sans-serif" font-size="13" letter-spacing="4">IMAGEM EM BREVE</text>
</svg>
